# 以下の形式で記述すること
# pages:
#  - name: 上場企業名
#    country: ja or us(ja: 日本株、us: 米国株)
#    code: 企業コード
#    category: 企業の業種。現在未使用(備考代わり)
#  ...
# csv:
#  - filename: 出力先CSVファイル名
#  - header: ヘッダ
# browser:
#   width: 起動するブラウザ(Chrome)の横幅
#   height: 起動するブラウザ(Chrome)の横幅
#   timeout: アクセス時タイムアウト値(ms)

base_url: https://finance.yahoo.co.jp/quote
stocks:
  - name: 企業名
    country: 国
    code: コード
    category: 未定
csv:
  filepath: dist
  filename: stocks.csv
  header:
    - 日時
    - 銘柄コード
    - 銘柄名
    - 株価(円)
pdf:
  filepath: dist
  header:
    - 日付
    - 銘柄
    - 国
    - 株価
browser:
  width: 1920
  height: 1080
  timeout: 60000
  headless_mode: True
log:
  filepath: log
  filename: stock_manager.log
